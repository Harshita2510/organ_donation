{% extends "base.html" %}
{% block title %}Home{% endblock %}
{% block content %}
<div class="panel">
    <h2 class="h5">View User Workflow</h2>
    <div class="action-grid">
        <form action="/search_detail" method="POST">
            <button class="btn btn-primary btn-block" type="submit">View / Update / Delete User Details</button>
        </form>
    </div>
</div>

<div class="panel">
    <h2 class="h5">Search Tables</h2>
    <div class="action-grid">
        <form action="/search_User_details" method="POST"><button class="btn btn-primary btn-block" type="submit">Users</button></form>
        <form action="/search_Patient_details" method="POST"><button class="btn btn-primary btn-block" type="submit">Patients</button></form>
        <form action="/search_Donor_details" method="POST"><button class="btn btn-primary btn-block" type="submit">Donors</button></form>
        <form action="/search_Organ_details" method="POST"><button class="btn btn-primary btn-block" type="submit">Organs</button></form>
        <form action="/search_Organization_details" method="POST"><button class="btn btn-primary btn-block" type="submit">Organizations</button></form>
        <form action="/search_Organization_head_details" method="POST"><button class="btn btn-primary btn-block" type="submit">Organization Heads</button></form>
        <form action="/search_Doctor_details" method="POST"><button class="btn btn-primary btn-block" type="submit">Doctors</button></form>
        <form action="/search_Transaction" method="POST"><button class="btn btn-primary btn-block" type="submit">Transactions</button></form>
        <form action="/search_log" method="POST"><button class="btn btn-primary btn-block" type="submit">Logs</button></form>
    </div>
</div>

<div class="panel">
    <h2 class="h5">Add Records</h2>
    <div class="action-grid">
        <form action="/add_User_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Add User</button></form>
        <form action="/add_User_phone_no_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Add User Phone Number</button></form>
        <form action="/add_Patient_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Add Patient</button></form>
        <form action="/add_Donor_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Add Donor</button></form>
        <form action="/add_Organ_available_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Add Organ</button></form>
        <form action="/add_Doctor_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Add Doctor</button></form>
        <form action="/add_Doctor_phone_no_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Add Doctor Phone Number</button></form>
        <form action="/add_Organization_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Add Organization</button></form>
        <form action="/add_Organization_phone_no_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Add Organization Phone Number</button></form>
        <form action="/add_Organization_head_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Add Organization Head</button></form>
        <form action="/add_Transaction_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Add Transaction</button></form>
    </div>
</div>

<div class="panel">
    <h2 class="h5">Update Records</h2>
    <div class="action-grid">
        <form action="/update_user_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Update User</button></form>
        <form action="/update_patient_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Update Patient</button></form>
        <form action="/update_donor_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Update Donor</button></form>
        <form action="/update_doctor_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Update Doctor</button></form>
        <form action="/update_organization_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Update Organization</button></form>
        <form action="/update_organization_head_page" method="POST"><button class="btn btn-primary btn-block" type="submit">Update Organization Head</button></form>
    </div>
</div>

<div class="panel">
    <h2 class="h5">Remove Records</h2>
    <div class="action-grid">
        <form action="/remove_user" method="POST"><button class="btn btn-primary btn-block" type="submit">Remove User</button></form>
        <form action="/remove_patient" method="POST"><button class="btn btn-primary btn-block" type="submit">Remove Patient</button></form>
        <form action="/remove_donor" method="POST"><button class="btn btn-primary btn-block" type="submit">Remove Donor</button></form>
        <form action="/remove_doctor" method="POST"><button class="btn btn-primary btn-block" type="submit">Remove Doctor</button></form>
        <form action="/remove_organization" method="POST"><button class="btn btn-primary btn-block" type="submit">Remove Organization</button></form>
        <form action="/remove_organization_head" method="POST"><button class="btn btn-primary btn-block" type="submit">Remove Organization Head</button></form>
    </div>
</div>

<div class="panel">
    <h2 class="h5">Reports</h2>
    <div class="action-grid">
        <form action="/statistics" method="POST"><button class="btn btn-primary btn-block" type="submit">Statistics</button></form>
    </div>
</div>
{% endblock %}
