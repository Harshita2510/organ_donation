{% extends "base.html" %}
{% block title %}User Details{% endblock %}
{% block content %}
{% if not_found %}
<div class="alert alert-warning" role="alert">User was not found.</div>
{% else %}
<div class="table-wrap">
    <table class="table table-striped table-sm">
        {% for field in fields %}
        <tr>
            <th>{{ field_label(field) }}</th>
            <td>{{ res[loop.index0] }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endif %}
{% endblock %}
